  <!-- ═══════════════ GLOBAL STYLES & ANIMATIONS ═══════════════ -->
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #050510;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      color: #F0EBE0;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0A0A18;
    }

    ::-webkit-scrollbar-thumb {
      background: #2A2A4A;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #FF6B35;
    }

    /* ─── Animations ─── */
    @keyframes floatOrb {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
        opacity: 0.7;
      }

      33% {
        transform: translate(50px, -70px) scale(1.08);
        opacity: 0.9;
      }

      66% {
        transform: translate(-40px, 40px) scale(0.92);
        opacity: 0.6;
      }
    }

    @keyframes floatOrb2 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(-60px, 50px) scale(1.05);
      }

      66% {
        transform: translate(30px, -40px) scale(0.95);
      }
    }

    @keyframes floatOrb3 {

      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(40px, -30px);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes pulseGlow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(255, 107, 53, 0.35), 0 4px 24px rgba(255, 107, 53, 0.2);
      }

      50% {
        box-shadow: 0 0 50px rgba(255, 107, 53, 0.6), 0 4px 40px rgba(255, 107, 53, 0.35);
      }
    }

    @keyframes shimmerText {
      0% {
        background-position: 0% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    @keyframes scanline {
      0% {
        top: -10%;
      }

      100% {
        top: 110%;
      }
    }

    @keyframes badgePulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.88) translateY(20px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .anim-fade-up {
      animation: fadeInUp 0.7s ease both;
    }

    .anim-delay-1 {
      animation-delay: 0.1s;
    }

    .anim-delay-2 {
      animation-delay: 0.22s;
    }

    .anim-delay-3 {
      animation-delay: 0.34s;
    }

    .anim-delay-4 {
      animation-delay: 0.46s;
    }

    .anim-delay-5 {
      animation-delay: 0.58s;
    }

    /* Gradient text helper */
    .grad-text {
      background: linear-gradient(135deg, #FF6B35 0%, #FF9F1C 40%, #FFD166 70%, #FF6B35 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmerText 4s linear infinite;
    }
  </style>
